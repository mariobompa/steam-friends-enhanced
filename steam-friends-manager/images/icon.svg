<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Steam-inspired background gradient -->
  <defs>
    <linearGradient id="steamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a3a"/>
      <stop offset="100%" style="stop-color:#0d2438"/>
    </linearGradient>
    <linearGradient id="circleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5db3cc"/>
      <stop offset="100%" style="stop-color:#4a9eb5"/>
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="128" height="128" fill="url(#steamGrad)"/>
  
  <!-- Large circular background (Steam circle aesthetic) -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="url(#circleFill)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="64" cy="64" r="52" fill="url(#circleFill)" opacity="0.08"/>
  
  <!-- Left human figure -->
  <g transform="translate(30, 40)">
    <!-- Head -->
    <circle cx="12" cy="8" r="5" fill="#5db3cc"/>
    <!-- Body -->
    <rect x="10" y="14" width="4" height="12" fill="#5db3cc"/>
    <!-- Left arm -->
    <line x1="10" y1="16" x2="4" y2="18" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="14" y1="16" x2="20" y2="18" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="11" y1="26" x2="9" y2="32" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="13" y1="26" x2="15" y2="32" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Right human figure -->
  <g transform="translate(62, 40)">
    <!-- Head -->
    <circle cx="12" cy="8" r="5" fill="#5db3cc"/>
    <!-- Body -->
    <rect x="10" y="14" width="4" height="12" fill="#5db3cc"/>
    <!-- Left arm -->
    <line x1="10" y1="16" x2="4" y2="18" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right arm -->
    <line x1="14" y1="16" x2="20" y2="18" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Left leg -->
    <line x1="11" y1="26" x2="9" y2="32" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Right leg -->
    <line x1="13" y1="26" x2="15" y2="32" stroke="#5db3cc" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- Plus/connection element in the middle (showing grouping/connection) -->
  <g transform="translate(58, 80)">
    <line x1="6" y1="0" x2="6" y2="12" stroke="#5db3cc" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="0" y1="6" x2="12" y2="6" stroke="#5db3cc" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- Circular accent ring (Steam circle detail) -->
  <circle cx="64" cy="64" r="58" fill="none" stroke="#5db3cc" stroke-width="1" opacity="0.2"/>
  
  <!-- Top accent line -->
  <line x1="0" y1="0" x2="128" y2="0" stroke="#5db3cc" stroke-width="2" opacity="0.3"/>
</svg>


