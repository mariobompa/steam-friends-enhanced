<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background (Steam colors) -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3e5f"/>
      <stop offset="100%" style="stop-color:#1a94bc"/>
    </linearGradient>
  </defs>
  
  <!-- Main circular background -->
  <circle cx="64" cy="64" r="64" fill="url(#bgGrad)"/>
  
  <!-- Left person (smaller) -->
  <g transform="translate(23, 35)">
    <!-- Head -->
    <circle cx="18" cy="18" r="16" fill="white"/>
    <!-- Body (semicircle) -->
    <path d="M 2 50 Q 2 34 18 34 Q 34 34 34 50 L 34 58 L 2 58 Z" fill="white"/>
  </g>
  
  <!-- Right person (larger, with Steam logo) -->
  <g transform="translate(48, 28)">
    <!-- Head -->
    <circle cx="28" cy="24" r="22" fill="white"/>
    <!-- Body (semicircle) -->
    <path d="M 2 68 Q 2 46 28 46 Q 54 46 54 68 L 54 80 L 2 80 Z" fill="white"/>
    
    <!-- Steam logo on body -->
    <g transform="translate(18, 58)">
      <!-- Steam circle background -->
      <circle cx="10" cy="8" r="9" fill="#1b3e5f"/>
      <!-- Steam gear and connector (simplified) -->
      <circle cx="8" cy="5" r="2.5" fill="white"/>
      <path d="M 8 5 L 12 11" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="12" cy="11" r="2" fill="white"/>
      <circle cx="14" cy="8" r="1.5" fill="white"/>
      <line x1="8" y1="5" x2="14" y2="8" stroke="white" stroke-width="0.8"/>
    </g>
  </g>
</svg>


