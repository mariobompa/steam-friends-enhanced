<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Steam-inspired background gradient -->
  <defs>
    <linearGradient id="steamGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a3a"/>
      <stop offset="100%" style="stop-color:#0d2438"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5db3cc"/>
      <stop offset="100%" style="stop-color:#4a9eb5"/>
    </linearGradient>
  </defs>
  
  <!-- Main background -->
  <rect width="128" height="128" fill="url(#steamGrad)"/>
  
  <!-- Decorative corner accent (Steam-inspired circle) -->
  <circle cx="112" cy="16" r="14" fill="#5db3cc" opacity="0.2"/>
  
  <!-- Main folder icon with friends element -->
  <g transform="translate(20, 28)">
    <!-- Folder -->
    <path d="M2 8C2 5.79086 3.79086 4 6 4H18L21 10H56C58.2091 10 60 11.7909 60 14V52C60 54.2091 58.2091 56 56 56H6C3.79086 56 2 54.2091 2 52V8Z" 
          stroke="url(#accentGrad)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Plus sign (group addition) -->
    <line x1="38" y1="22" x2="38" y2="42" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="28" y1="32" x2="48" y2="32" stroke="url(#accentGrad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Friends indicator dots (bottom right) -->
  <g transform="translate(65, 75)">
    <!-- Group of friends represented as circles -->
    <circle cx="0" cy="0" r="4" fill="#5db3cc" opacity="0.9"/>
    <circle cx="10" cy="-3" r="4" fill="#5db3cc" opacity="0.7"/>
    <circle cx="8" cy="8" r="4" fill="#5db3cc" opacity="0.7"/>
  </g>
  
  <!-- Top accent line (Steam theme element) -->
  <line x1="0" y1="0" x2="128" y2="0" stroke="#5db3cc" stroke-width="2" opacity="0.4"/>
</svg>

